security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_accueil
                always_use_default_target_path: true
                enable_csrf: true
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 1209600  # 14 days in seconds
                path: /
                remember_me_parameter: _remember_me
            logout:
                path: app_logout
                target: app_login

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/$, roles: PUBLIC_ACCESS }           # Page de login accessible à tous
        - { path: ^/login, roles: PUBLIC_ACCESS }       # Route de login accessible à tous
        - { path: ^/register, roles: PUBLIC_ACCESS }    # Route d'inscription accessible à tous (demande seulement)
        - { path: ^/verify-code, roles: PUBLIC_ACCESS }  # Route de vérification du code accessible à tous
        - { path: ^/api/verification-code, roles: PUBLIC_ACCESS }  # Route API sécurisée par clé API (authentification gérée dans le contrôleur)
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }  # Route de demande de réinitialisation accessible à tous
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }  # Route de réinitialisation accessible à tous
        - { path: ^/demo/login, roles: PUBLIC_ACCESS }  # Connexion démo (désactivée si APP_DEMO_MODE=0)
        - { path: ^/search, roles: ROLE_USER }          # Recherche uniquement pour utilisateurs connectés
        - { path: ^/accueil, roles: ROLE_USER }         # Accueil protégé pour les utilisateurs connectés
        - { path: ^/, roles: ROLE_USER }                # Toutes les autres pages protégées

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
